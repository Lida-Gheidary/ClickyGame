<!doctype html>
<html class="no-js" lang="">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title></title>
  <link rel="stylesheet" href="css/style.css">
  <meta name="description" content="">

  <meta property="og:title" content="">
  <meta property="og:type" content="">
  <meta property="og:url" content="">
  <meta property="og:image" content="">
  <meta property="og:image:alt" content="">

  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="icon" href="/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icon.png">

  <link rel="manifest" href="site.webmanifest">
  <meta name="theme-color" content="#fafafa">
</head>

<body>

  <h1 id="gameTitle">🚀 Rocket Clicker 🚀</h1>
  <p id="subtitle">Rockets are launching faster than you can click! Prove them wrong 💪🏼</p>

<div id="hud">
  <div id="scoreDisplay">⭐ 0</div>
  <div id="timerDisplay">⏱ 60</div>
</div>
  
  <div id="gameArea"></div>

  <button id="button1">Start</button>

<div id="endSection">
  <p id="finalScore" style="display:none; color:#FFD700; font-size:1.8rem; font-weight:bold; text-shadow: 0 0 10px rgba(255,215,0,0.8);"></p>
  <label id="label1" for="name">Enter your name & submit score:</label>
  <input type="text" id="name" name="name" required minlength="3" maxlength="16" size="16" />
  <button id="button2">Submit Score</button>
  <div id="scoreboard"></div>
  <button id="button3">Show Scoreboard</button>
</div>

  <script src="js/app.js"></script>

</body>

</html>
